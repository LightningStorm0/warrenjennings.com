<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
<style>
canvas {
    border:1px solid #d3d3d3;
    background-color: #f1f1f1;
}
html, body {margin: 0; height: 100%; overflow: hidden}
</style>
</head>
<body onload="startGame()">
<div style="position: absolute; left: 0px; top: 0px; margin: 5px; z-index: 1;"><img id="qr" src=""><div id="id"></div></div>
<script>

var delta = 1/60;

var x = 0;

var peer = new Peer((Math.random().toString(36) + '0000000000000000000').substr(2, 6));

var peerID = "Loading...";

var connections = [];

class Player {
  constructor() {
    this.state = "idle";
    //idle, fall, land, tumble, move, jump

    this.stick = [0, 0];
    this.position = [300, 300];

    this.action_buffer = "";
  }
}

var players = [];

peer.on('open', function(id) {
  console.log('My peer ID is: ' + id);
  peerID = id;
  document.getElementById("qr").src = "https://api.qrserver.com/v1/create-qr-code/?data=warrenjennings.com/?g=" + peerID +"&size=128x128"
  document.getElementById("id").innerHTML = "Game Code: " + peerID;
});

peer.on('connection', function(conn) {
  conn.number = connections.length
  connections.push(conn);
  players.push(new Player())

  conn.on('open', function() {
    // Receive messages
    conn.on('data', function(data) {
      players[conn.number].stick = data.joystick
      players[conn.number].action_buffer = data.action
      players[conn.number].frames_in_buffer = 0;
    });

    conn.on('close', function(data) {
      console.log("closed a connection")
      players.splice(conn.number, 1);
      connections.splice(conn.number, 1);
    });
  });
});

var size = [0, 0];

function startGame() {
    myGameArea.start();
}

var myGameArea = {
    canvas : document.createElement("canvas"),
    start : function() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
        size = [window.innerWidth, window.innerHeight];
        this.context = this.canvas.getContext("2d");
        document.body.insertBefore(this.canvas, document.body.childNodes[0]);
        this.frameNo = 0;
        this.interval = setInterval(updateGameArea, 1000/60);
        },
    clear : function() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
        size = [window.innerWidth, window.innerHeight];
        this.context.clearRect(0, 0, this.canvas.width, this.canvas.height);
    }
}

function compute() {
  for (p in players) {
    players[p].position[0] += players[p].stick[0]*delta*20
    players[p].position[1] += players[p].stick[1]*delta*20
  }
}

function updateGameArea() {
    compute()

    myGameArea.clear();

    var ctx = myGameArea.context;


    ctx.fillStyle = "#000000"

    for (p in players) {
      if (players[p].action_buffer == "a_tap" || players[p].action_buffer == "a_end_hold") {
        ctx.fillStyle = "#3b54f7"
        players[p].action_buffer = "";
      }
      else if (players[p].action_buffer == "a_start_hold") {
        ctx.fillStyle = "#3b54f7"
      }

      if (players[p].action_buffer == "b_tap" || players[p].action_buffer == "b_end_hold") {
        ctx.fillStyle = "#f77b8c"
        players[p].action_buffer = "";
      }
      else if (players[p].action_buffer == "b_start_hold") {
        ctx.fillStyle = "#f77b8c"
      }

      ctx.fillRect(players[p].position[0]-10, players[p].position[1]-10, 20, 20);
    }
}
</script>
</html>
