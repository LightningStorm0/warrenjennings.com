<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
<style>
canvas {
    border:1px solid #d3d3d3;
    background-color: #f1f1f1;
}
</style>
</head>
<body onload="startGame()">
<div id="id"></div>
<script>

var delta = 1/60;

var x = 0;

var peer = new Peer((Math.random().toString(36) + '0000000000000000000').substr(2, 6));

var peerID = "Loading...";

var connections = [];

class Player {
  constructor() {
    this.stick = [0, 0];
    this.position = [0, 0];

    this.action_buffer = "";

    this.hold_frames_buffer = "";
    this.frames_in_buffer = 0;
  }
}

var players = [];

peer.on('open', function(id) {
  console.log('My peer ID is: ' + id);
  peerID = id;
  document.getElementById("id").innerHTML = peerID;
});

peer.on('connection', function(conn) {
  conn.number = connections.length
  connections.push(conn);
  players.push(new Player())

  conn.on('open', function() {
    // Receive messages
    conn.on('data', function(data) {
      players[conn.number].stick = data.joystick
      players[conn.number].action_buffer = data.action
      players[conn.number].hold_frames_buffer = data.hold_frames
      players[conn.number].frames_in_buffer = 0;

      console.log("a: " + players[conn.number].action_buffer)
      console.log("f: " + players[conn.number].hold_frames.toString())
    });

    conn.on('close', function(data) {
      console.log("closed a connection")
      players.splice(conn.number, 1);
      connections.splice(conn.number, 1);
    });
  });
});



function startGame() {
    myGameArea.start();
}

var myGameArea = {
    canvas : document.createElement("canvas"),
    start : function() {
        this.canvas.width = 480;
        this.canvas.height = 270;
        this.context = this.canvas.getContext("2d");
        document.body.insertBefore(this.canvas, document.body.childNodes[0]);
        this.frameNo = 0;
        this.interval = setInterval(updateGameArea, 1000/60);
        },
    clear : function() {
        this.context.clearRect(0, 0, this.canvas.width, this.canvas.height);
    }
}

function compute() {
  for (p in players) {
    players[p].position[0] += players[p].stick[0]*delta*20
    players[p].position[1] += players[p].stick[1]*delta*20
  }
}

function updateGameArea() {
    compute()

    myGameArea.clear();

    var ctx = myGameArea.context;

    for (p in players) {
      ctx.fillRect(players[p].position[0]-10, players[p].position[1]-10, 20, 20);
    }
}
</script>
</html>
